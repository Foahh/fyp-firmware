syntax = "proto3";

import "nanopb.proto";

/* ============================================================================
 * Shared sub-messages
 * ============================================================================ */

message Timing {
  uint32 inference_us = 1;
  uint32 postprocess_us = 2;
  uint32 nn_period_us = 3;
  uint32 frame_drop_count = 4;
}

message Detection {
  float x_center_norm = 1;
  float y_center_norm = 2;
  float width_norm = 3;
  float height_norm = 4;
  float confidence_ratio = 5;
  int32 class_index = 6;
}

message TrackedBox {
  float x_center_norm = 1;
  float y_center_norm = 2;
  float width_norm = 3;
  float height_norm = 4;
  uint32 track_id = 5;
}

message TofAlert {
  uint32 hand_distance_mm = 1;
  uint32 hazard_distance_mm = 2;
  bool alert = 3;
  float distance_3d_mm = 4;
  bool stale = 5;
  repeated int32 depth_grid_mm = 6 [(nanopb).max_count = 64];
}

message CpuLoad {
  float usage_percent = 1;
}

/* ============================================================================
 * Device payloads
 * ============================================================================ */

message DetectionResult {
  uint32 timestamp_ms = 1;
  Timing timing = 2;
  repeated Detection detections = 3 [(nanopb).max_count = 10];
  uint32 detection_timestamp_ms = 4;
  TofAlert tof = 5;
  CpuLoad cpu = 6;
  repeated TrackedBox tracked_boxes = 7 [(nanopb).max_count = 10];
}

message DeviceInfo {
  uint32 display_width_px = 1;
  uint32 display_height_px = 2;
  uint32 letterbox_width_px = 3;
  uint32 letterbox_height_px = 4;
  uint32 nn_width_px = 5;
  uint32 nn_height_px = 6;
  string model_name = 7 [(nanopb).max_size = 64];
  repeated string class_labels = 8 [
    (nanopb).max_size = 32,
    (nanopb).max_count = 10
  ];
  uint32 command_id = 9;
  uint32 nn_input_size_bytes = 10;
  bool overdrive_mode = 11;
  uint32 camera_fps = 12;
  uint32 mcu_freq_mhz = 13;
  uint32 npu_freq_mhz = 14;
  string build_timestamp = 15 [(nanopb).max_size = 24];
  uint32 timestamp_ms = 16;
}

message Ack {
  uint32 command_id = 1;
  bool success = 2;
  uint32 timestamp_ms = 3;
}

message TraceXChunk {
  uint32 offset_bytes = 1;
  uint32 total_size_bytes = 2;
  bytes data = 3 [(nanopb).max_size = 256];
  bool done = 4;
  uint32 timestamp_ms = 5;
}

/* ============================================================================
 * Host payloads
 * ============================================================================ */

message SetDisplayEnabled {
  bool enabled = 1;
  uint32 timestamp_ms = 2;
}

message GetDeviceInfo {
  uint32 timestamp_ms = 1;
}

message GetTraceXDump {
  uint32 chunk_size_bytes = 1;
  uint32 timestamp_ms = 2;
}

/* ============================================================================
 * Top-level wrappers
 * ============================================================================ */

message DeviceMessage {
  oneof payload {
    DetectionResult detection_result = 1;
    DeviceInfo device_info = 2;
    Ack ack = 3;
    TraceXChunk tracex_chunk = 4;
  }
}

message HostMessage {
  uint32 command_id = 1;
  oneof command {
    SetDisplayEnabled set_display_enabled = 2;
    GetDeviceInfo get_device_info = 3;
    GetTraceXDump get_tracex_dump = 5;
  }
}
