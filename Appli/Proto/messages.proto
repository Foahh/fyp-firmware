syntax = "proto3";

import "nanopb.proto";

/* ============================================================================
 * Shared sub-messages
 * ============================================================================ */

/* Normalized box in [0,1]; class_id is the model class index. */
message Detection {
  float x = 1;
  float y = 2;
  float w = 3;
  float h = 4;
  float score = 5;
  uint32 class_id = 6;
}

message TrackedBox {
  float x = 1;
  float y = 2;
  float w = 3;
  float h = 4;
  uint32 track_id = 5;
}

/* ============================================================================
 * Device payloads
 * ============================================================================ */

/*
 * Timing fields are inlined (no submessage) to avoid extra protobuf length
 * delimiters and nanopb has_* submessage flags on the hot path.
 */
message DetectionResult {
  uint32 sent_timestamp_ms = 1;
  uint32 frame_timestamp_ms = 2;
  uint32 inference_us = 3;
  uint32 postprocess_us = 4;
  uint32 nn_period_us = 5;
  uint32 frame_drop_count = 6;
  uint32 tracker_us = 7;
  float cpu_usage_percent = 8;
  repeated Detection detections = 9 [(nanopb).max_count = 10];
  repeated TrackedBox tracks = 10 [(nanopb).max_count = 10];
}

message TofResult {
  uint32 timestamp_ms = 1;
  repeated int32 depth_mm = 2 [(nanopb).max_count = 64];
  repeated uint32 range_sigma_mm = 3 [(nanopb).max_count = 64];
  repeated uint32 signal_per_spad = 4 [(nanopb).max_count = 64];
  uint32 tof_period_us = 5;
}

/* flags: bit0 = person-distance alert, bit1 = measurement stale. */
message TofAlertResult {
  uint32 timestamp_ms = 1;
  uint32 flags = 2;
  repeated uint32 person_mm = 3 [(nanopb).max_count = 4];
  uint32 fusion_period_us = 4;
}

/* Scalar fields first for compact C struct layout; strings last. */
message DeviceInfo {
  uint32 timestamp_ms = 1;
  uint32 display_width_px = 2;
  uint32 display_height_px = 3;
  uint32 letterbox_width_px = 4;
  uint32 letterbox_height_px = 5;
  uint32 nn_width_px = 6;
  uint32 nn_height_px = 7;
  uint32 nn_input_size_bytes = 8;
  uint32 power_mode = 9;
  uint32 camera_fps = 10;
  uint32 mcu_freq_mhz = 11;
  uint32 npu_freq_mhz = 12;
  string model_name = 13 [(nanopb).max_size = 64];
  repeated string class_labels = 14 [
    (nanopb).max_size = 32,
    (nanopb).max_count = 10
  ];
  string build_timestamp = 15 [(nanopb).max_size = 24];
  float pp_conf_threshold = 16;
  float pp_iou_threshold = 17;
  float track_thresh = 18;
  float det_thresh = 19;
  float sim1_thresh = 20;
  float sim2_thresh = 21;
  uint32 tlost_cnt = 22;
}

message Ack {
  bool success = 1;
  uint32 timestamp_ms = 2;
}

message TraceXChunk {
  uint32 offset_bytes = 1;
  uint32 total_size_bytes = 2;
  bytes data = 3 [(nanopb).max_size = 256];
  bool done = 4;
  uint32 timestamp_ms = 5;
}

/* ============================================================================
 * Host payloads
 * ============================================================================ */

message SetDisplayEnabled {
  bool enabled = 1;
  uint32 timestamp_ms = 2;
}

message GetDeviceInfo {
  uint32 timestamp_ms = 1;
}

message GetTraceXDump {
  uint32 chunk_size_bytes = 1;
  uint32 timestamp_ms = 2;
}

message SetPostprocessConfig {
  float pp_conf_threshold = 1;
  float pp_iou_threshold = 2;
  float track_thresh = 3;
  float det_thresh = 4;
  float sim1_thresh = 5;
  float sim2_thresh = 6;
  uint32 tlost_cnt = 7;
  uint32 timestamp_ms = 8;
}

/* ============================================================================
 * Top-level wrappers
 * ============================================================================ */

message DeviceMessage {
  oneof payload {
    DetectionResult detection_result = 1;
    DeviceInfo device_info = 2;
    Ack ack = 3;
    TraceXChunk tracex_chunk = 4;
    TofResult tof_result = 5;
    TofAlertResult tof_alert_result = 6;
  }
}

message HostMessage {
  oneof command {
    SetDisplayEnabled set_display_enabled = 1;
    GetDeviceInfo get_device_info = 2;
    GetTraceXDump get_tracex_dump = 3;
    SetPostprocessConfig set_postprocess_config = 4;
  }
}
