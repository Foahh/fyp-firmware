syntax = "proto3";

import "nanopb.proto";

/* ============================================================================
 * Shared sub-messages
 * ============================================================================ */

/* Normalized box in [0,1]; class_id is the model class index. */
message Detection {
  float x = 1;
  float y = 2;
  float w = 3;
  float h = 4;
  float score = 5;
  uint32 class_id = 6;
}

message TrackedBox {
  float x = 1;
  float y = 2;
  float w = 3;
  float h = 4;
  uint32 track_id = 5;
}

/*
 * flags: bit0 = proximity alert, bit1 = measurement stale.
 * depth_mm: row-major 8x8, millimeters (sensor-native range).
 */
message TofAlert {
  uint32 hand_mm = 1;
  uint32 hazard_mm = 2;
  uint32 flags = 3;
  float distance_3d_mm = 4;
  repeated int32 depth_mm = 5 [(nanopb).max_count = 64];
}

/* ============================================================================
 * Device payloads
 * ============================================================================ */

/*
 * Timing fields are inlined (no submessage) to avoid extra protobuf length
 * delimiters and nanopb has_* submessage flags on the hot path.
 */
message DetectionResult {
  uint32 sent_timestamp_ms = 1;
  uint32 frame_timestamp_ms = 2;
  uint32 inference_us = 3;
  uint32 postprocess_us = 4;
  uint32 nn_period_us = 5;
  uint32 frame_drop_count = 6;
  uint32 tracker_us = 7;
  float cpu_usage_percent = 8;
  repeated Detection detections = 9 [(nanopb).max_count = 10];
  repeated TrackedBox tracks = 10 [(nanopb).max_count = 10];
  TofAlert tof = 11;
}

/* Scalar fields first for compact C struct layout; strings last. */
message DeviceInfo {
  uint32 command_id = 1;
  uint32 timestamp_ms = 2;
  uint32 display_width_px = 3;
  uint32 display_height_px = 4;
  uint32 letterbox_width_px = 5;
  uint32 letterbox_height_px = 6;
  uint32 nn_width_px = 7;
  uint32 nn_height_px = 8;
  uint32 nn_input_size_bytes = 9;
  uint32 power_mode = 10;
  uint32 camera_fps = 11;
  uint32 mcu_freq_mhz = 12;
  uint32 npu_freq_mhz = 13;
  string model_name = 14 [(nanopb).max_size = 64];
  repeated string class_labels = 15 [
    (nanopb).max_size = 32,
    (nanopb).max_count = 10
  ];
  string build_timestamp = 16 [(nanopb).max_size = 24];
}

message Ack {
  uint32 command_id = 1;
  bool success = 2;
  uint32 timestamp_ms = 3;
}

message TraceXChunk {
  uint32 offset_bytes = 1;
  uint32 total_size_bytes = 2;
  bytes data = 3 [(nanopb).max_size = 256];
  bool done = 4;
  uint32 timestamp_ms = 5;
}

/* ============================================================================
 * Host payloads
 * ============================================================================ */

message SetDisplayEnabled {
  bool enabled = 1;
  uint32 timestamp_ms = 2;
}

message GetDeviceInfo {
  uint32 timestamp_ms = 1;
}

message GetTraceXDump {
  uint32 chunk_size_bytes = 1;
  uint32 timestamp_ms = 2;
}

/* ============================================================================
 * Top-level wrappers
 * ============================================================================ */

message DeviceMessage {
  oneof payload {
    DetectionResult detection_result = 1;
    DeviceInfo device_info = 2;
    Ack ack = 3;
    TraceXChunk tracex_chunk = 4;
  }
}

message HostMessage {
  uint32 command_id = 1;
  oneof command {
    SetDisplayEnabled set_display_enabled = 2;
    GetDeviceInfo get_device_info = 3;
    GetTraceXDump get_tracex_dump = 4;
  }
}
