syntax = "proto3";

import "nanopb.proto";

/* ============================================================================
 * Shared sub-messages
 * ============================================================================ */

message Timing {
  uint32 inference_ms = 1;
  uint32 postprocess_ms = 2;
  uint32 nn_period_ms = 3;
  uint32 slow_frames = 4;
}

message Detection {
  float x_center = 1;
  float y_center = 2;
  float width = 3;
  float height = 4;
  float conf = 5;
  int32 class_index = 6;
}

message ImuData {
  int32 x_mg = 1;
  int32 y_mg = 2;
  int32 z_mg = 3;
  bool wake = 4;
}

message TofAlert {
  uint32 hand_distance_mm = 1;
  uint32 hazard_distance_mm = 2;
  bool alert = 3;
  float distance_3d_mm = 4;
  bool stale = 5;
  repeated int32 depth_grid = 6 [(nanopb).max_count = 64];
}

/* ============================================================================
 * Device payloads
 * ============================================================================ */

message DetectionResult {
  uint32 timestamp = 1;
  Timing timing = 2;
  repeated Detection detections = 3 [(nanopb).max_count = 10];
  ImuData imu = 4;
  TofAlert tof = 5;
}

message DeviceInfo {
  uint32 display_width = 1;
  uint32 display_height = 2;
  uint32 letterbox_width = 3;
  uint32 letterbox_height = 4;
  uint32 nn_width = 5;
  uint32 nn_height = 6;
  string model_name = 7 [(nanopb).max_size = 64];
  repeated string class_labels = 8 [
    (nanopb).max_size = 32,
    (nanopb).max_count = 10
  ];
  uint32 command_id = 9;
}

message Ack {
  uint32 command_id = 1;
  bool success = 2;
}

/* ============================================================================
 * Host payloads
 * ============================================================================ */

message SetDisplayEnabled {
  bool enabled = 1;
}

message GetDeviceInfo {}

/* ============================================================================
 * Top-level wrappers
 * ============================================================================ */

message DeviceMessage {
  oneof payload {
    DetectionResult detection_result = 1;
    DeviceInfo device_info = 2;
    Ack ack = 3;
  }
}

message HostMessage {
  uint32 command_id = 1;
  oneof command {
    SetDisplayEnabled set_display_enabled = 2;
    GetDeviceInfo get_device_info = 3;
  }
}
